  <!-- Load more -->
  <div class="text-center mt-8" x-show="activeTab === 'models' && filteredModels.length > modelPage * pageSize">

       x-text="lang === 'ko' ? '이슈를 등록하면 자동으로 PR이 생성됩니다. 관리자 검토 후 추가됩니다.' : 'Open an issue and a PR will be created automatically for admin review.'"></p>

<!-- ═══════════════════════════════════ ALPINE APP ═══════════════════════════════════ -->
<script>
function app() {
  return {
    // State
    lang: 'ko',
    darkMode: false,
    activeTab: 'models',
    sortBy: 'stars',
    search: '',
    modelPage: 1,
    datasetPage: 1,
    toolPage: 1,
    pageSize: 12,

    // Data
    metadata: { last_updated: '', total_models: 0, total_datasets: 0, total_tools: 0, total_orgs: 0 },
    models: [],
    datasets: [],
    tools: [],

    // Filters
    filters: { years: [], categories: [], hardware: [], learning: [], sources: [], toolTypes: [] },

    // Derived filter options
    get allYears() {
      const items = this.activeTab === 'models' ? this.models
                  : this.activeTab === 'datasets' ? this.datasets
                  : this.tools;
      return [...new Set(items.map(i => i.year))].sort((a, b) => b - a);
    },
    get allCategories() {
      const items = this.activeTab === 'models' ? this.models : this.datasets;
      return [...new Set(items.flatMap(i => i.categories || []))].sort();
    },
    get allHardware() {
      return [...new Set(this.models.flatMap(m => m.hardware || []))].sort();
    },
    get allLearning() {
      return [...new Set(this.models.flatMap(m => m.learning || []))].sort();
    },
    get allSources() {
      return [...new Set(this.datasets.flatMap(d => d.source || []))].sort();
    },
    get allToolTypes() {
      return [...new Set(this.tools.map(t => t.type).filter(Boolean))].sort();
    },
    get hasActiveFilters() {
      return Object.values(this.filters).some(f => f.length > 0) || this.search.length > 0;
    },
    get totalStars() {
      const all = [...this.models, ...this.datasets, ...this.tools];
      return all.reduce((s, i) => s + (i.stats?.github_stars || 0), 0);
    },

    // Filtered + sorted lists
    get filteredModels() {
      return this._sort(this.models.filter(m => this._matchesFilters(m, 'model')));
    },
    get filteredDatasets() {
      return this._sort(this.datasets.filter(d => this._matchesFilters(d, 'dataset')));
    },
    get filteredTools() {
      return this._sort(this.tools.filter(t => this._matchesFilters(t, 'tool')));
    },
    get paginatedModels() {
      return this.filteredModels.slice(0, this.modelPage * this.pageSize);
    },
    get paginatedDatasets() {
      return this.filteredDatasets.slice(0, this.datasetPage * this.pageSize);
    },
    get paginatedTools() {
      return this.filteredTools.slice(0, this.toolPage * this.pageSize);
    },

    _matchesFilters(item, type) {
      const q = this.search.toLowerCase();
      if (q) {
        const haystack = [
          item.name, item.org, item.description_en, item.description_ko,
          ...(item.tags || []), ...(item.categories || []),
          ...(item.hardware || []), ...(item.learning || []),
          ...(item.language || []), item.type || '',
        ].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      if (this.filters.years.length && !this.filters.years.includes(item.year)) return false;
      if (type === 'model') {
        if (this.filters.categories.length && !this.filters.categories.some(c => (item.categories || []).includes(c))) return false;
        if (this.filters.hardware.length && !this.filters.hardware.some(h => (item.hardware || []).includes(h))) return false;
        if (this.filters.learning.length && !this.filters.learning.some(l => (item.learning || []).includes(l))) return false;
      }
      if (type === 'dataset') {
        if (this.filters.categories.length && !this.filters.categories.some(c => (item.categories || []).includes(c))) return false;
        if (this.filters.sources.length && !this.filters.sources.some(s => (item.source || []).includes(s))) return false;
      }
      if (type === 'tool') {
        if (this.filters.toolTypes.length && !this.filters.toolTypes.includes(item.type)) return false;
      }
      return true;
    },

    _sort(items) {
      return [...items].sort((a, b) => {
        if (this.sortBy === 'stars') return (b.stats?.github_stars || 0) - (a.stats?.github_stars || 0);
        if (this.sortBy === 'year_desc') return b.year - a.year;
        if (this.sortBy === 'year_asc') return a.year - b.year;
        if (this.sortBy === 'name') return a.name.localeCompare(b.name);
        return 0;
      });
    },

    toggleFilter(key, val) {
      const arr = this.filters[key];
      const idx = arr.indexOf(val);
      if (idx === -1) arr.push(val);
      else arr.splice(idx, 1);
      this.modelPage = 1;
      this.datasetPage = 1;
      this.toolPage = 1;
      this.syncToURL();
    },

    clearFilters() {
      this.filters = { years: [], categories: [], hardware: [], learning: [], sources: [], toolTypes: [] };
      this.search = '';
      this.modelPage = 1;
      this.datasetPage = 1;
      this.toolPage = 1;
      this.syncToURL();
    },

    // ── URL 파라미터 동기화 ──
    // URL 파라미터 목록 (필터 추가 시 여기도 수정):
    //   tab      → activeTab        (허용: models, datasets, tools)
    //   q        → search           (문자열)
    //   sort     → sortBy           (허용: stars, year_desc, year_asc, name)
    //   year     → filters.years    (쉼표 구분 정수: 2023,2024)
    //   category → filters.categories (쉼표 구분: manipulation,locomotion)
    //   hardware → filters.hardware   (쉼표 구분: humanoid,mobile)
    //   learning → filters.learning   (쉼표 구분: VLA,IL,diffusion)
    //   source   → filters.sources    (쉼표 구분: real,simulation)
    //   toolType → filters.toolTypes  (쉼표 구분: physics_engine,benchmark)
    syncToURL() {
      const p = new URLSearchParams();
      // 기본값이 아닌 경우만 URL에 포함 (필터 추가 시 여기도 수정)
      if (this.activeTab !== 'models') p.set('tab', this.activeTab);
      if (this.search) p.set('q', this.search);
      if (this.sortBy !== 'stars') p.set('sort', this.sortBy);
      if (this.filters.years.length) p.set('year', this.filters.years.join(','));
      if (this.filters.categories.length) p.set('category', this.filters.categories.join(','));
      if (this.filters.hardware.length) p.set('hardware', this.filters.hardware.join(','));
      if (this.filters.learning.length) p.set('learning', this.filters.learning.join(','));
      if (this.filters.sources.length) p.set('source', this.filters.sources.join(','));
      if (this.filters.toolTypes.length) p.set('toolType', this.filters.toolTypes.join(','));

      const qs = p.toString();
      const url = location.pathname + (qs ? '?' + qs : '');

      // 현재 URL과 같으면 스킵 (중복 히스토리 방지)
      if (url === location.pathname + location.search) return;

      history.pushState(null, '', url);
    },

    // ── URL → 상태 복원 (필터 추가 시 여기도 수정) ──
    loadFromURL() {
      const p = new URLSearchParams(location.search);

      // 허용 목록 검증 (필터 추가 시 여기도 수정)
      const tab = p.get('tab');
      if (['models', 'datasets', 'tools'].includes(tab)) this.activeTab = tab;

      if (p.has('q')) this.search = p.get('q');

      const sort = p.get('sort');
      if (['stars', 'year_desc', 'year_asc', 'name'].includes(sort)) this.sortBy = sort;

      if (p.has('year')) this.filters.years = p.get('year').split(',').map(Number).filter(n => !isNaN(n));
      if (p.has('category')) this.filters.categories = p.get('category').split(',');
      if (p.has('hardware')) this.filters.hardware = p.get('hardware').split(',');
      if (p.has('learning')) this.filters.learning = p.get('learning').split(',');
      if (p.has('source')) this.filters.sources = p.get('source').split(',');
      if (p.has('toolType')) this.filters.toolTypes = p.get('toolType').split(',');
    },

    // ── 뒤로가기/앞으로가기 핸들러 (pushState 사용 시 필수) ──
    _handlePopState() {
      this.filters = { years: [], categories: [], hardware: [], learning: [], sources: [], toolTypes: [] };
      this.search = '';
      this.activeTab = 'models';
      this.sortBy = 'stars';
      this.loadFromURL();
      this.modelPage = 1;
      this.datasetPage = 1;
      this.toolPage = 1;
    },

    // ── Charts ──
    buildCharts() {
      if (typeof Chart === 'undefined') { console.error('Chart.js not loaded'); return; }
      const isDark = this.darkMode;
      const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
      const labelColor = isDark ? '#9ca3af' : '#6b7280';

      const chartOpts = () => ({
        indexAxis: 'y',
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: labelColor } },
          y: { grid: { color: 'transparent' }, ticks: { color: labelColor, font: { size: 11 } } },
        }
      });

      // --- Top 5 Models ---
      const topModels = [...this.models]
        .sort((a, b) => (b.stats?.github_stars || 0) - (a.stats?.github_stars || 0))
        .slice(0, 5).reverse();

      const modelCanvas = document.getElementById('timelineChart');
      const existingModel = Chart.getChart(modelCanvas);
      if (existingModel) existingModel.destroy();
      new Chart(modelCanvas, {
        type: 'bar',
        data: {
          labels: topModels.map(m => m.name),
          datasets: [{ data: topModels.map(m => m.stats?.github_stars || 0),
            backgroundColor: '#6366f1cc', borderColor: '#6366f1', borderWidth: 1, borderRadius: 4 }]
        },
        options: {
          ...chartOpts(),
          onClick: (_, elements) => {
            if (elements.length > 0) {
              const url = topModels[elements[0].index]?.github_url;
              if (url) window.open(url, '_blank');
            }
          },
        },
      });

      // --- Top 5 Datasets ---
      const topDatasets = [...this.datasets]
        .sort((a, b) => (b.stats?.github_stars || 0) - (a.stats?.github_stars || 0))
        .slice(0, 5).reverse();

      const datasetCanvas = document.getElementById('categoryChart');
      const existingDataset = Chart.getChart(datasetCanvas);
      if (existingDataset) existingDataset.destroy();
      new Chart(datasetCanvas, {
        type: 'bar',
        data: {
          labels: topDatasets.map(d => d.name),
          datasets: [{ data: topDatasets.map(d => d.stats?.github_stars || 0),
            backgroundColor: '#22c55ecc', borderColor: '#22c55e', borderWidth: 1, borderRadius: 4 }]
        },
        options: {
          ...chartOpts(),
          onClick: (_, elements) => {
            if (elements.length > 0) {
              const url = topDatasets[elements[0].index]?.github_url;
              if (url) window.open(url, '_blank');
            }
          },
        },
      });
    },

    // ── Init ──
    async init() {
      this.darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

      this.$watch('models', () => { if (this.models.length > 0) setTimeout(() => this.buildCharts(), 0); });
      this.$watch('darkMode', () => { if (this.models.length > 0) setTimeout(() => this.buildCharts(), 0); });

      try {
        const data = window.__PHYSICAL_AI_DATA__
          || await fetch('./data.json').then(r => r.json());
        this.metadata = data.metadata;
        this.models = data.models || [];
        this.datasets = data.datasets || [];
        this.tools = data.tools || [];
      } catch (e) {
        console.error('Failed to load data:', e);
      }

      // ── URL 파라미터 연결 (데이터 로드 후 호출해야 필터링 정상 동작) ──
      this.loadFromURL();

      // 탭/정렬/검색 변경 감지 → URL 동기화
      this.$watch('activeTab', () => this.syncToURL());
      this.$watch('sortBy', () => this.syncToURL());
      this.$watch('search', () => this.syncToURL());

      // 뒤로가기/앞으로가기 → URL에서 상태 복원
      window.addEventListener('popstate', () => this._handlePopState());
    }
  }
}
</script>
